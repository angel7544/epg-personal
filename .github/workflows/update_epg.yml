name: Auto Update EPG

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout EPG Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Create required directories
        run: mkdir -p src/epg-data

      - name: Generate Channel Lists
        run: |
          npm run jiotv:generate
          npm run tataplay:generate

      - name: Grab EPG (JioTV)
        run: npm run grab -- --channels=india.channels.xml --output=india.xml --days=2

      - name: Grab EPG (Tata Play)
        run: npm run grab -- --channels=tataplay.channels.xml --output=tataplay.xml --days=2

      - name: Extract EPG
        run: npm run epg:extract -- -i india.xml tataplay.xml -o src/epg-data

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/epg-data
          git add india.channels.xml tataplay.channels.xml
          git add india.m3u tataplay.m3u
          git commit -m "chore: updated jiotv and tataplay epg data [$(date +'%Y-%m-%d')]" || echo "No changes to commit"
          git push origin master
