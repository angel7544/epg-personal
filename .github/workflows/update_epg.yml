name: Auto Update EPG

on:
  schedule:
    - cron: '0 0 * * *'   # Daily at midnight UTC
    - cron: '30 0 1 * *'  # Monthly on the 1st at 00:30 UTC (Fresh Reset)
  workflow_dispatch: # Allows manual trigger
    inputs:
      cleanup:
        description: 'Force Fresh Reset (Clears src/epg-data)'
        required: false
        default: 'false'
        type: boolean

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout EPG Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Create required directories
        run: mkdir -p src/epg-data

      - name: Generate Channel Lists
        run: |
          npm run jiotv:generate
          npm run tataplay:generate
          npm run airtel:generate
          npm run dishtv:generate
          npm run epgshare01:generate

      - name: Grab EPG (JioTV)
        run: npm run grab -- --channels=india.channels.xml --output=india.xml --days=2

      - name: Grab EPG (Tata Play)
        run: npm run grab -- --channels=tataplay.channels.xml --output=tataplay.xml --days=2

      - name: Grab EPG (Airtel)
        run: npm run grab -- --channels=india-airtel.channels.xml --output=india-airtel.xml --days=2

      - name: Grab EPG (DishTV)
        run: npm run grab -- --channels=dishtv.channels.xml --output=dishtv.xml --days=2

      - name: Grab EPG (EPGShare01)
        run: npm run grab -- --channels=epgshare01.channels.xml --output=epgshare01.xml --days=2

      - name: Monthly Cleanup (Fresh Reset)
        if: contains(github.event.schedule, '30 0 1 * *') || github.event.inputs.cleanup == 'true'
        run: |
          echo "📅 Monthly Fresh Reset triggered. Clearing old data..."
          rm -rf src/epg-data/*

      - name: Extract EPG
        run: npm run epg:extract -- -i india.xml tataplay.xml india-airtel.xml dishtv.xml epgshare01.xml -o src/epg-data

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/epg-data
          git add india.channels.xml tataplay.channels.xml india-airtel.channels.xml dishtv.channels.xml epgshare01.channels.xml
          git add india.m3u tataplay.m3u india-airtel.m3u dishtv.m3u epgshare01.m3u
          git commit -m "chore: updated epg data (jiotv, tataplay, airtel, dishtv, epgshare01) [$(date +'%Y-%m-%d')]" || echo "No changes to commit"
          git push origin master
